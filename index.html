<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bijutsu Studio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Bijutsu Studio</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="pricing.html">Pricing</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="hero">
    <h1>Anime Art, Original Characters & Short Animations</h1>
    <p>Custom PFPs, OC designs, and cinematic 10–15 second animations.</p>
    <div class="hero-buttons">
      <a class="btn primary" href="portfolio.html">View Portfolio</a>
      <a class="btn" href="pricing.html">See Prices</a>
    </div>
  </main>

  <button id="ai-toggle">BOT</button>

  <section id="ai-panel">
    <div class="ai-header">
      <span>Bijutsu AI</span>
      <button id="ai-close">×</button>
    </div>
    <div id="ai-messages"></div>
    <div class="ai-input-row">
      <input id="ai-input" type="text" placeholder="Ask about prices, OC design, delivery...">
      <button id="ai-send">Send</button>
    </div>
  </section>

  <script src="js/script.js"></script>
  <script src="js/ai.js"></script>
</body>
</html>
